<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لسوسو بس ❤️</title>
<style>
  body { 
    font-family: 'Cairo', sans-serif; 
    background: linear-gradient(135deg, #ff4d6d, #ff8fa3); 
    text-align: center; 
    padding: 30px; 
    color: white;
  }
  #login-box {
    background: rgba(0,0,0,0.3); 
    padding: 40px; border-radius: 25px; width: 80%; max-width: 400px;
    margin: 80px auto;
  }
  input, button {
    padding: 15px; width: 80%; border-radius: 10px; border: none;
    font-size: 18px; margin: 10px; cursor: pointer;
  }
  button { background: #000; color: white; font-weight: bold; }
  #content { display: none; }
  h1 { font-size: 40px; text-shadow: 2px 2px 4px #000; }
  .btn { 
    background: #000; color: white; padding: 20px 40px; 
    border-radius: 50px; text-decoration: none; 
    font-size: 22px; font-weight: bold; display: inline-block; 
    margin: 20px;
  }
</style>
</head>
<body>

<!-- شاشة الباسورد -->
<div id="login-box">
  <h2>🔒 ليكي انتي بس يا سوسو</h2>
  <input type="password" id="password" placeholder="اكتبي الباسورد">
  <br>
  <button onclick="checkPassword()">ادخلي</button>
  <p id="error" style="display:none;">غلط يا سوسو 😢 الباسورد "بحبك يا سوسو"</p>
</div>

<!-- محتوى الموقع -->
<div id="content">
  <h1>ياللي زعلان مني ومخصمني 😔</h1>
  <p style="font-size: 22px;">حبيب انا اسف والله حقك عليا</p>
  
  <img src="https://i.imgur.com/8Km9tLL.jpg" width="250" style="border-radius:20px; border:4px solid white;">
  
  <div style="background:rgba(0,0,0,0.3); padding:20px; border-radius:20px; margin:20px auto; width:85%;">
    <h2>اوعدك</h2>
    <p>مش هزعلك تاني</p>
    <p>انتِ كل دنيتي يا سوسو</p>
  </div>

  <!-- زرار الواتساب المضمون -->
  <a href="https://wa.me/201xxxxxxxxx?text=خلاص%20مسامحاك%20❤️" class="btn" target="_blank">
    كلميني واتساب 😘
  </a>
  
  <p>ملحوظة: شغلي اغنية "ياللي زعلان مني" من عندك في الخلفية</p>
</div>

<script>
function checkPassword(){
  let pass = document.getElementById('password').value;
  if(pass === "بحبك يا سوسو"){
    document.getElementById('login-box').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } else {
    document.getElementById('error').style.display = 'block';
  }
}
</script>

</body>
</html>
